# bacon.toml — twisterDBA background checker configuration

default_job = "clippy"

[jobs.clippy]
command = ["cargo", "clippy", "--color", "always", "--", "-D", "warnings"]
need_stdout = false

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.test]
command = ["cargo", "nextest", "run", "--color", "always"]
need_stdout = true

[jobs.test-legacy]
command = ["cargo", "test", "--color", "always"]
need_stdout = true

[keybindings]
c = "job:clippy"
t = "job:test"
T = "job:test-legacy"
v = "toggle-backtrace"
